name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # ソリューションには npm 依存の esproj が含まれるため、
      # サーバー側のプロジェクトだけを明示的に対象にする。
      - name: Restore
        run: dotnet restore TaskBoard.Server.Tests/TaskBoard.Server.Tests.csproj

      - name: Build
        run: dotnet build TaskBoard.Server.Tests/TaskBoard.Server.Tests.csproj --no-restore -c Release

      - name: Test
        run: dotnet test TaskBoard.Server.Tests/TaskBoard.Server.Tests.csproj --no-build -c Release --verbosity normal

  server-integration:
    name: Server integration (Testcontainers + PostgreSQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # GitHub ホストの ubuntu ランナーには Docker が同梱されているため、
      # Testcontainers が PostgreSQL コンテナを起動できる（ローカルで Docker が
      # 無い場合は各テストが自動でスキップされる）。
      - name: Restore
        run: dotnet restore TaskBoard.Server.IntegrationTests/TaskBoard.Server.IntegrationTests.csproj

      - name: Build
        run: dotnet build TaskBoard.Server.IntegrationTests/TaskBoard.Server.IntegrationTests.csproj --no-restore -c Release

      - name: Test
        run: dotnet test TaskBoard.Server.IntegrationTests/TaskBoard.Server.IntegrationTests.csproj --no-build -c Release --verbosity normal

  client:
    name: Client (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: taskboard.client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: taskboard.client/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck & build
        run: npm run build

      - name: Test
        run: npm run test:run

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: taskboard.client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: taskboard.client/package-lock.json

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # 実 API・実 Supabase には繋がない（.env.e2e を使い、/api は page.route で差し替える）。
      - name: Run E2E
        run: npm run e2e

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: taskboard.client/playwright-report/
          retention-days: 7
